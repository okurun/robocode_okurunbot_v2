plugins {
    id 'java'
    id 'application'
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

repositories {
    mavenCentral()
}

ext {
    tankRoyaleVersion = '1.0.2'
}

dependencies {
    implementation "dev.robocode.tankroyale:robocode-tankroyale-bot-api:${tankRoyaleVersion}"

    testImplementation 'org.junit.jupiter:junit-jupiter:5.10.2'
    testImplementation 'org.mockito:mockito-core:5.11.0'
    testImplementation 'org.mockito:mockito-junit-jupiter:5.11.0'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

sourceSets {
    main {
        java {
            srcDirs = ['src/main']
        }
    }
}

application {
    mainClass = 'okurun.OkuRunBot'
}

test {
    useJUnitPlatform()
}

